name: CD — Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.sha_short }}

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USER }}/boston-crm-server:latest
            ${{ secrets.DOCKER_HUB_USER }}/boston-crm-server:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USER }}/boston-crm-client:latest
            ${{ secrets.DOCKER_HUB_USER }}/boston-crm-client:${{ steps.meta.outputs.sha_short }}
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/boston-crm

      - name: SSH & deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/boston-crm
            export DOCKER_HUB_USER=${{ secrets.DOCKER_HUB_USER }}
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            export MONGO_USER=${{ secrets.MONGO_USER }}
            export MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
            export MONGO_DB=${{ secrets.MONGO_DB }}
            export REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

            sleep 15
            curl -sf http://localhost/health || (echo "Health check failed" && exit 1)
            echo "✅ Deployment complete: $IMAGE_TAG"
