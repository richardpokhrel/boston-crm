version: '3.9'

services:
  mongo:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data

  server:
    image: ${DOCKER_HUB_USER}/boston-crm-server:${IMAGE_TAG:-latest}
    restart: always
    env_file: ./server/.env.prod
    environment:
      NODE_ENV: production
      MONGO_URI: ./server/.env.prod
      REDIS_URL: ./server/.env.prod
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  client:
    image: ${DOCKER_HUB_USER}/boston-crm-client:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - server

volumes:
  mongodata:
  redisdata:

networks:
  default:
    name: boston_crm_prod
